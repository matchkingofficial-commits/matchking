<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchKing Terminal — Whitelist Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #E5C158;
            --gold-glow: rgba(229, 193, 88, 0.35);
            --void: #050507;
            --text-main: #F4EFE4;
            --text-muted: rgba(244, 239, 228, 0.4);
        }

        body { 
            background: var(--void); color: var(--text-main); 
            font-family: 'DM Mono', monospace; display: flex; 
            justify-content: center; align-items: center; 
            height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .admin-card { 
            background: linear-gradient(145deg, #121216, #09090c); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; 
            padding: 40px; width: 100%; max-width: 450px; 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8); 
        }

        .header-wrap { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
        
        .mk-crown { font-size: 40px; color: var(--gold); margin-bottom: 10px; line-height: 1; }

        h2 { 
            font-family: 'Bebas Neue', sans-serif; font-size: 28px; 
            color: #fff; margin: 0 0 5px 0; letter-spacing: 2px; 
        }

        .subtitle { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; margin-bottom: 8px; font-size: 10px; 
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; 
        }

        input { 
            width: 100%; padding: 14px; background: #050505; 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; 
            color: #fff; font-family: 'DM Mono', monospace; font-size: 13px; 
            box-sizing: border-box; transition: all 0.3s ease; 
        }

        input:focus { border-color: var(--gold); outline: none; box-shadow: 0 0 10px var(--gold-glow); }

        button { 
            width: 100%; padding: 16px; margin-top: 10px;
            background: linear-gradient(135deg, var(--gold), #997A15); 
            border: none; color: #000; font-family: 'DM Mono', monospace; 
            font-weight: 600; font-size: 13px; border-radius: 6px; cursor: pointer; 
            text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; 
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(229, 193, 88, 0.3); }

        .status-box { 
            margin-top: 20px; padding: 12px; border-radius: 6px; 
            font-size: 11px; text-align: center; display: none; line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header-wrap">
        <div class="mk-crown">♛</div>
        <h2>CONSOLE MANAGER</h2>
        <div class="subtitle">Administrative Whitelist Portal</div>
    </div>
    
    <div class="input-group">
        <label for="adminPassword">Admin Secret Password</label>
        <input type="password" id="adminPassword" placeholder="Enter strictly authorized key..." required>
    </div>

    <div class="input-group">
        <label for="clientEmail">Client Email Address</label>
        <input type="email" id="clientEmail" placeholder="client@example.com" required>
    </div>

    <div class="input-group">
        <label for="clientToken">License Access Token</label>
        <input type="text" id="clientToken" placeholder="e.g. MK_PREMIUM_992" required>
    </div>

    <button id="actionBtn" onclick="submitWhitelist()">WHITELIST CLIENT</button>
    
    <div id="statusBox" class="status-box"></div>
</div>

<script>
async function submitWhitelist() {
    const adminPassword = document.getElementById('adminPassword').value;
    const email = document.getElementById('clientEmail').value;
    const token = document.getElementById('clientToken').value;
    const statusBox = document.getElementById('statusBox');
    const btn = document.getElementById('actionBtn');

    if(!adminPassword || !email || !token) {
        alert('System Error: Please fill out all required fields.');
        return;
    }

    btn.textContent = 'PROCESSING...';
    statusBox.style.display = 'none';

    try {
        const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, token, adminPassword })
        });

        const data = await response.json();
        statusBox.style.display = 'block';

        if (response.ok) {
            statusBox.style.background = 'rgba(39, 174, 96, 0.1)';
            statusBox.style.color = '#4caf50';
            statusBox.style.border = '1px solid rgba(39, 174, 96, 0.2)';
            statusBox.textContent = data.message;
            
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientToken').value = '';
        } else {
            throw new Error(data.error || 'Registration failed.');
        }
    } catch (err) {
        statusBox.style.display = 'block';
        statusBox.style.background = 'rgba(255, 106, 106, 0.1)';
        statusBox.style.color = '#ff6a6a';
        statusBox.style.border = '1px solid rgba(255, 106, 106, 0.2)';
        statusBox.textContent = err.message;
    } finally {
        btn.textContent = 'WHITELIST CLIENT';
    }
}
</script>

</body>
</html>
