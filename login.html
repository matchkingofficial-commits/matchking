<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchKing Terminal — Secure Authorization</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #E5C158;
            --gold-glow: rgba(229, 193, 88, 0.35);
            --gold-border: rgba(229, 193, 88, 0.2);
            --void: #050507;
            --panel: #0a0a0e;
            --text-main: #F4EFE4;
            --text-muted: rgba(244, 239, 228, 0.4);
        }

        body { 
            background: radial-gradient(circle at top center, #111118 0%, var(--void) 100%);
            color: var(--text-main); 
            font-family: 'DM Mono', monospace; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .login-card { 
            background: linear-gradient(145deg, #121216, #09090c); 
            border: 1px solid var(--gold-border); 
            padding: 50px 40px; border-radius: 12px; 
            width: 100%; max-width: 400px; 
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(229, 193, 88, 0.03); 
            text-align: center;
        }

        .mk-crown {
            font-size: 56px; color: var(--gold); 
            line-height: 1; margin-bottom: 10px;
            text-shadow: 0 0 25px var(--gold-glow);
        }

        h2 { 
            font-family: 'Bebas Neue', sans-serif; font-size: 32px; 
            color: #fff; margin: 0 0 5px 0; letter-spacing: 2px; 
        }

        .subtitle {
            font-size: 11px; color: var(--text-muted); 
            margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;
        }

        .input-group { margin-bottom: 25px; text-align: left; }
        label { 
            display: block; margin-bottom: 8px; font-size: 10px; 
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
        }
        
        input { 
            width: 100%; padding: 14px; 
            background: #050505; border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 6px; color: #fff; font-family: 'DM Mono', monospace; 
            font-size: 13px; box-sizing: border-box; transition: all 0.3s ease;
        }

        input:focus { 
            border-color: var(--gold); outline: none; 
            box-shadow: 0 0 15px var(--gold-glow); 
        }

        button { 
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, var(--gold), #997A15); 
            border: none; border-radius: 6px; color: #000; 
            font-family: 'DM Mono', monospace; font-weight: 600; font-size: 13px; 
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer; 
            transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(229, 193, 88, 0.2);
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(229, 193, 88, 0.4); 
        }

        .error-msg { 
            color: #ff6a6a; font-size: 11px; margin-top: 20px; 
            text-align: center; display: none; padding: 10px; 
            background: rgba(255, 106, 106, 0.1); border: 1px solid rgba(255, 106, 106, 0.2); 
            border-radius: 4px; 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="mk-crown">♛</div>
        <h2>TERMINAL ACCESS</h2>
        <div class="subtitle">MatchKing Secure Authorization Port</div>

        <form id="login-form">
            <div class="input-group">
                <label>Premium Registration Email</label>
                <input type="email" id="email" required placeholder="name@domain.com">
            </div>
            <button type="submit" id="submit-btn">Initialize Connection</button>
            <div id="error-display" class="error-msg"></div>
        </form>
    </div>

    <script>
        function getDeviceFingerprint() {
            const navigatorInfo = window.navigator.userAgent + window.navigator.language + window.screen.colorDepth;
            let hash = 0;
            for (let i = 0; i < navigatorInfo.length; i++) {
                const char = navigatorInfo.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return 'mk_dev_' + Math.abs(hash);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const errorDisplay = document.getElementById('error-display');
            const submitBtn = document.getElementById('submit-btn');

            errorDisplay.style.display = 'none';
            submitBtn.textContent = 'VALIDATING PORT...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        device_fp: getDeviceFingerprint()
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Authentication Failed.');
                }

                sessionStorage.setItem('mk_auth_token', data.token);
                sessionStorage.setItem('mk_user_email', data.email);
                sessionStorage.setItem('mk_device_fp', getDeviceFingerprint());
                sessionStorage.setItem('mk_login_time', Date.now());

                window.location.href = '/matchking/index.html';

            } catch (err) {
                errorDisplay.textContent = err.message;
                errorDisplay.style.display = 'block';
                submitBtn.textContent = 'INITIALIZE CONNECTION';
            }
        });

        // Preserved Fallback logic from user's original file
        document.addEventListener('DOMContentLoaded', () => {
            const loginFormFallback = document.getElementById('matchking-login-form');
            if (loginFormFallback) {
                loginFormFallback.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const emailValue = document.getElementById('login-email').value.trim();
                    const passwordValue = document.getElementById('login-password').value;
                    const errorDisplay = document.getElementById('login-error-msg');
                    if (!emailValue || !passwordValue) {
                        if (errorDisplay) errorDisplay.textContent = "Please fill in all layout credentials fields.";
                        return;
                    }
                    try {
                        if (emailValue && passwordValue.length >= 4) {
                            const sessionSecureToken = "dp_live_token_" + btoa(emailValue + Date.now()).substring(0, 32);
                            sessionStorage.setItem('mk_auth_token', sessionSecureToken);
                            sessionStorage.setItem('mk_user_email', emailValue);
                            sessionStorage.setItem('mk_login_time', Date.now().toString());
                            window.location.href = '/index.html'; 
                        } else {
                            if (errorDisplay) errorDisplay.textContent = "Invalid sign-in information credential sets.";
                        }
                    } catch (error) {
                        if (errorDisplay) errorDisplay.textContent = "Connection interface failed during verification processing.";
                    }
                });
            }
        });
    </script>
</body>
</html>
